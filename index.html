<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terremoto Digital — Be right back, stranger.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playball&display=swap&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="page">

    <div class="top">
      <div class="wordmark">Terremoto<span>Digital</span></div>
      <div class="status"><div class="dot"></div>stay gorgeous</div>
    </div>

    <div class="middle">
      <!-- <p class="eyebrow">// chaos mode</p> -->
      <h1 class="headline">
        Be right back,<br>
        <span class="soft">stranger.</span>
      </h1>
      <p class="italic-line">we're shaking things up</p>
      <div class="rule"></div>

      <div class="quote-center">
        <div class="quote-mark-large">"</div>
        <p class="quote-main">She takes the joke too far.</p>
      </div>

      <div class="form-wrap">
        <p class="form-intro">don't be a stranger</p>
        <!-- <p class="form-label">// come here</p> -->
        <div class="form-row">
          <input class="form-input" type="email" id="emailInput" placeholder="your@email.com" />
          <button class="form-btn" id="submitBtn">drop it</button>
        </div>
        <p class="form-confirm" id="confirm">noted cowboy — we'll be in touch.</p>
      </div>
    </div>

    <div class="bottom">
      <div class="bottom-right">
        <div class="big-year">2026</div>
        <div class="prog-bar"><div class="prog-fill"></div></div>
        <div class="prog-label">breathe</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
